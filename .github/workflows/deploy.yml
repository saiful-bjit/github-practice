# ============================================================
# CI/CD Pipeline
#
# Workflow:
#
#   Push to main
#        │
#        ▼
#     Build
#      ├──────────────┬──────────────┐
#      ▼              ▼              ▼
#   Render         Vercel        Firebase
#      │              │              │
#      ▼              └──────┬───────┘
#   Release                 ▼
#                          Stage
#
# Execution Order:
# 1. Build
# 2. Render, Vercel, and Firebase (parallel)
# 3. Release (after Render)
# 4. Stage (after both Vercel and Firebase)
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ----------------------------------------------------------
  # Build
  # Runs first. All deployment jobs depend on this job.
  # ----------------------------------------------------------
  build:
    name: Build
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Building..."

  # ----------------------------------------------------------
  # Render Deployment
  # Runs after Build completes successfully.
  # ----------------------------------------------------------
  render:
    name: Render
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Render
        run: |
          echo "Deploying to Render..."
          # Add Render deployment command here

  # ----------------------------------------------------------
  # Release
  # Runs only after Render deployment succeeds.
  # ----------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - render

    steps:
      - name: Release
        run: |
          echo "Creating Release..."

  # ----------------------------------------------------------
  # Vercel Deployment
  # Runs after Build completes successfully.
  # ----------------------------------------------------------
  vercel:
    name: Vercel
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Vercel
        run: |
          echo "Deploying to Vercel..."
          # Add Vercel deployment command here

  # ----------------------------------------------------------
  # Firebase Deployment
  # Runs after Build completes successfully.
  # ----------------------------------------------------------
  firebase:
    name: Firebase
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Firebase
        run: |
          echo "Deploying to Firebase..."
          # Add Firebase deployment command here

  # ----------------------------------------------------------
  # Stage
  # Runs only after both Vercel and Firebase deployments
  # complete successfully.
  # ----------------------------------------------------------
  stage:
    name: Stage
    runs-on: ubuntu-latest
    needs:
      - vercel
      - firebase

    steps:
      - name: Stage Deployment
        run: |
          echo "Deploying to Stage..."